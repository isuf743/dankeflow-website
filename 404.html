<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 — Page Not Found | DankeFlow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #3b82f6;
      --accent:  #60a5fa;
      --bg:      #020617;
      --border:  rgba(59,130,246,0.15);
      --text:    #e2e8f0;
      --muted:   #64748b;
      --grad:    linear-gradient(135deg, #2563eb, #3b82f6);
    }

    html, body {
      height: 100%;
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    body::after {
      content: '';
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -55%);
      width: 800px; height: 600px;
      background:
        radial-gradient(ellipse at 30% 40%, rgba(37,99,235,0.25) 0%, transparent 60%),
        radial-gradient(ellipse at 70% 60%, rgba(96,165,250,0.12) 0%, transparent 55%);
      pointer-events: none;
      z-index: 0;
      animation: glowPulse 8s ease-in-out infinite;
    }
    @keyframes glowPulse {
      0%,100% { opacity:0.7; transform:translate(-50%,-55%) scale(1); }
      50%      { opacity:1;   transform:translate(-50%,-55%) scale(1.06); }
    }

    .particles { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
    .particle  { position:absolute; border-radius:50%; opacity:0; animation:floatUp var(--dur) var(--delay) infinite; }
    @keyframes floatUp {
      0%   { transform:translateY(100vh) translateX(0); opacity:0; }
      10%  { opacity:0.5; }
      90%  { opacity:0.15; }
      100% { transform:translateY(-10vh) translateX(var(--drift)); opacity:0; }
    }

    .page {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }

    .logo {
      display: flex; align-items: center; gap: 10px;
      text-decoration: none; margin-bottom: 48px;
      animation: fadeUp 0.5s ease forwards;
    }
    .logo-icon { width:36px; height:36px; }
    .logo-text { font-family:'Inter',sans-serif; font-size:1.25rem; font-weight:700; color:#fff; }
    .logo-text span { color:var(--primary); }

    .error-num {
      font-family: 'Syne', sans-serif;
      font-size: clamp(7rem, 20vw, 14rem);
      font-weight: 800;
      line-height: 1;
      letter-spacing: -4px;
      background: var(--grad);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      position: relative;
      animation: fadeUp 0.6s 0.1s ease both;
    }
    .error-num::before,
    .error-num::after {
      content: '404';
      position: absolute;
      top:0; left:0; right:0;
      background: var(--grad);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .error-num::before { animation:glitch1 4s infinite; clip-path:polygon(0 20%,100% 20%,100% 40%,0 40%); }
    .error-num::after  { animation:glitch2 4s infinite; clip-path:polygon(0 60%,100% 60%,100% 75%,0 75%); }
    @keyframes glitch1 {
      0%,88%,100% { transform:translate(0); opacity:0; }
      90% { transform:translate(-5px,2px); opacity:0.7; }
      92% { transform:translate(4px,-2px); opacity:0.4; }
      94% { transform:translate(-2px,0); opacity:0.6; }
    }
    @keyframes glitch2 {
      0%,88%,100% { transform:translate(0); opacity:0; }
      91% { transform:translate(5px,2px); opacity:0.5; }
      93% { transform:translate(-4px,-1px); opacity:0.3; }
      95% { transform:translate(2px,1px); opacity:0.5; }
    }

    .error-title {
      font-family: 'Syne', sans-serif;
      font-size: clamp(1.3rem, 3vw, 2rem);
      font-weight: 700; color: #fff;
      margin-top: 12px; margin-bottom: 14px;
      animation: fadeUp 0.6s 0.2s ease both;
    }

    .error-desc {
      font-size: 1rem; color: var(--muted);
      max-width: 400px; line-height: 1.7;
      animation: fadeUp 0.6s 0.3s ease both;
    }

    .divider {
      width: 48px; height: 2px;
      background: var(--grad);
      border-radius: 2px;
      margin: 28px auto;
      animation: fadeUp 0.6s 0.35s ease both;
    }

    .btns {
      display: flex; gap: 14px; flex-wrap: wrap; justify-content: center;
      animation: fadeUp 0.6s 0.4s ease both;
    }

    .btn-primary {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--grad); color: #fff;
      padding: 13px 28px; border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem; font-weight: 600;
      text-decoration: none;
      transition: opacity 0.2s, transform 0.2s;
    }
    .btn-primary:hover { opacity:0.85; transform:translateY(-2px); }

    .btn-secondary {
      display: inline-flex; align-items: center; gap: 8px;
      background: transparent; color: var(--accent);
      padding: 13px 28px; border-radius: 10px;
      border: 1px solid rgba(59,130,246,0.35);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem; font-weight: 500;
      text-decoration: none;
      transition: border-color 0.2s, background 0.2s, transform 0.2s;
    }
    .btn-secondary:hover { border-color:var(--primary); background:rgba(59,130,246,0.08); transform:translateY(-2px); }

    .countdown {
      margin-top: 28px;
      font-size: 0.78rem; color: var(--muted);
      animation: fadeUp 0.6s 0.5s ease both;
    }
    .countdown span { color:var(--accent); font-weight:600; }

    @keyframes fadeUp {
      from { opacity:0; transform:translateY(20px); }
      to   { opacity:1; transform:translateY(0); }
    }

    @media (max-width:480px) {
      .btns { flex-direction:column; align-items:center; }
      .btn-primary, .btn-secondary { width:100%; justify-content:center; }
    }
  </style>
</head>
<body>

<div class="particles" id="particles"></div>

<div class="page">

  <a href="/" class="logo">
    <svg class="logo-icon" viewBox="0 0 40 40" fill="none">
      <defs>
        <linearGradient id="lg" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#2563eb"/>
          <stop offset="100%" stop-color="#60a5fa"/>
        </linearGradient>
      </defs>
      <path d="M8 6 H18 C28 6 34 12 34 20 C34 28 28 34 18 34 H8 Z" fill="url(#lg)" opacity="0.15"/>
      <path d="M8 6 H18 C28 6 34 12 34 20 C34 28 28 34 18 34 H8" stroke="url(#lg)" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M14 28 L22 12" stroke="#60a5fa" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
    </svg>
    <span class="logo-text">Danke<span>Flow</span></span>
  </a>

  <div class="error-num">404</div>

  <h1 class="error-title">Page Not Found</h1>

  <p class="error-desc">
    Looks like this page took a wrong turn. It might have been moved, deleted, or never existed in the first place.
  </p>

  <div class="divider"></div>

  <div class="btns">
    <a href="/" class="btn-primary">← Back to Home</a>
    <a href="/contact" class="btn-secondary">Contact Us</a>
  </div>

  <p class="countdown">
    Redirecting to home in <span id="timer">10</span> seconds...
  </p>

</div>

<script>
  // Particles
  const container = document.getElementById('particles');
  for (let i = 0; i < 25; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = 1 + Math.random() * 3;
    p.style.cssText = `
      left:${Math.random()*100}%;
      width:${size}px; height:${size}px;
      background:${Math.random()>0.5?'#3b82f6':'#60a5fa'};
      --dur:${7+Math.random()*10}s;
      --delay:${Math.random()*8}s;
      --drift:${(Math.random()-0.5)*120}px;
    `;
    container.appendChild(p);
  }

  // Countdown redirect
  let t = 10;
  const el = document.getElementById('timer');
  const iv = setInterval(() => {
    t--;
    el.textContent = t;
    if (t <= 0) { clearInterval(iv); window.location.href = '/'; }
  }, 1000);
</script>
</body>
</html>
